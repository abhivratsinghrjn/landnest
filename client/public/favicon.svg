<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2d5f3f"/>
  <!-- House roof -->
  <polygon points="32,10 10,30 54,30" fill="#ffffff" opacity="0.95"/>
  <!-- House body -->
  <rect x="16" y="30" width="32" height="22" rx="2" fill="#ffffff" opacity="0.95"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="14" rx="2" fill="#2d5f3f"/>
  <!-- Left window -->
  <rect x="18" y="33" width="8" height="7" rx="1" fill="#4a8c5f"/>
  <!-- Right window -->
  <rect x="38" y="33" width="8" height="7" rx="1" fill="#4a8c5f"/>
  <!-- Chimney -->
  <rect x="40" y="14" width="5" height="12" rx="1" fill="#ffffff" opacity="0.8"/>
  <!-- Door knob -->
  <circle cx="35" cy="46" r="1.2" fill="#ffffff" opacity="0.7"/>
</svg>
